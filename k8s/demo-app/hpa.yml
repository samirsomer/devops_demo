apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: fastapi-hpa
  namespace: devops-demo

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-demo-app

  minReplicas: 2
  maxReplicas: 10

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

